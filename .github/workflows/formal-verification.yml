name: Formal Verification

on:
  workflow_run:
    workflows: ["Build Docker"]
    types: [completed]
    branches: [main, "feature/*"]

jobs:
  formal-verification:
    name: Frama-C WP Proofs
    runs-on: ubuntu-latest

    # Only run if Docker build succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Pull Docker image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run formal verification inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            bash -c "
              cd /workspace/Software && just prove-report
            "

      - name: Upload proof report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proof-report
          path: |
            Devops/Build/Verification/proof-log.txt