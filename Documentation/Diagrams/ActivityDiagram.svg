<?plantuml 1.2026.2beta3?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1076px" preserveAspectRatio="none" style="width:731px;height:1076px;background:#FFFFFF;" version="1.1" viewBox="0 0 731 1076" width="731px" zoomAndPan="magnify"><title>Firmware Main Loop (20 ms Tick-Based, Non-Blocking)</title><defs/><g><g class="title" data-source-line="5"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="431.0537" x="148.5969" y="32.9951">Firmware Main Loop (20 ms Tick-Based, Non-Blocking)</text></g><ellipse cx="153.8555" cy="57.2969" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200" x="53.8555" y="87.2969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="111.0293" x="63.8555" y="108.4355">Initialize hardware</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200" x="53.8555" y="185.2656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="68.0977" x="63.8555" y="206.4043">Wait 20 ms</text><path d="M273.8555,229.2344 L273.8555,260.5 L253.8555,264.5 L273.8555,268.5 L273.8555,299.7656 A0,0 0 0 0 273.8555,299.7656 L550.4946,299.7656 A0,0 0 0 0 550.4946,299.7656 L550.4946,239.2344 L540.4946,229.2344 L273.8555,229.2344 A0,0 0 0 0 273.8555,229.2344" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M540.4946,229.2344 L540.4946,239.2344 L550.4946,239.2344 L540.4946,229.2344" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.2925" x="279.8555" y="246.3013">Detect press-release event.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.415" x="279.8555" y="261.4341">If pump is not currently running:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.3745" x="288.1201" y="276.5669">- Increase selected watering duration.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="211.9292" x="288.1201" y="291.6997">- Schedule display update pulse.</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200" x="53.8555" y="247.5156"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="124.0723" x="63.8555" y="268.6543">Process button input</text><path d="M273.8555,309.7656 L273.8555,348.5977 L253.8555,352.5977 L273.8555,356.5977 L273.8555,395.4297 A0,0 0 0 0 273.8555,395.4297 L691.2476,395.4297 A0,0 0 0 0 691.2476,395.4297 L691.2476,319.7656 L681.2476,309.7656 L273.8555,309.7656 A0,0 0 0 0 273.8555,309.7656" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M681.2476,309.7656 L681.2476,319.7656 L691.2476,319.7656 L681.2476,309.7656" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.0557" x="279.8555" y="326.8325">If a pulse is scheduled:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="250.8657" x="288.1201" y="341.9653">- Drive display clock HIGH for one tick.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="108.9956" x="279.8555" y="357.0981">On the next tick:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.8887" x="288.1201" y="372.231">- Drive display clock LOW.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="396.3921" x="279.8555" y="387.3638">The display hardware handles digit increment and wrapping.</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200" x="53.8555" y="335.6133"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="128.4258" x="63.8555" y="356.752">Process display pulse</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200.6914" x="53.5098" y="415.4297"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="180.6914" x="63.5098" y="436.5684">Update internal time counters</text><path d="M273.8555,515.1089 L273.8555,576.6401 L253.8555,580.6401 L273.8555,584.6401 L273.8555,646.1714 A0,0 0 0 0 273.8555,646.1714 L673.6899,646.1714 A0,0 0 0 0 673.6899,646.1714 L673.6899,525.1089 L663.6899,515.1089 L273.8555,515.1089 A0,0 0 0 0 273.8555,515.1089" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M663.6899,515.1089 L663.6899,525.1089 L673.6899,525.1089 L663.6899,515.1089" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132.228" x="279.8555" y="532.1758">If watering is active:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.7173" x="288.1201" y="547.3086">- Keep pump enabled.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="370.5698" x="288.1201" y="562.4414">- Decrease remaining time of current 5-second segment.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.7808" x="288.1201" y="577.5742">- When the segment completes:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.7085" x="304.6494" y="592.707">- Decrease number of remaining segments.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="335.5625" x="304.6494" y="607.8398">- If segments remain, start next 5-second segment.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.5532" x="279.8555" y="622.9727">If no watering is active:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.6689" x="288.1201" y="638.1055">- Ensure pump is disabled.</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200" x="53.8555" y="563.6558"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="167.0859" x="63.8555" y="584.7944">Update pump runtime state</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="200" x="53.8555" y="714.5737"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="133.5527" x="63.8555" y="735.7124">Evaluate soil moisture</text><path d="M316.7109,818.0972 L316.7109,849.3628 L296.7109,853.3628 L316.7109,857.3628 L316.7109,888.6284 A0,0 0 0 0 316.7109,888.6284 L624.4092,888.6284 A0,0 0 0 0 624.4092,888.6284 L624.4092,828.0972 L614.4092,818.0972 L316.7109,818.0972 A0,0 0 0 0 316.7109,818.0972" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M614.4092,818.0972 L614.4092,828.0972 L624.4092,828.0972 L614.4092,818.0972" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="265.6685" x="322.7109" y="835.1641">This updates internal runtime state only.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.6982" x="322.7109" y="850.2969">The pump output will be enabled during the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.9399" x="322.7109" y="865.4297">next periodic pump update.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227.5381" x="322.7109" y="880.5625">No blocking operation occurs here.</text><rect fill="#F1F1F1" height="33.9688" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="285.7109" x="11" y="836.3784"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="265.7109" x="21" y="857.5171">Start watering cycle using selected duration</text><polygon fill="#F1F1F1" points="124.1265,769.6948,183.5845,769.6948,195.5845,781.6948,183.5845,793.6948,124.1265,793.6948,112.1265,781.6948,124.1265,769.6948" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="19.0083" x="157.8555" y="803.9053">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="59.458" x="124.1265" y="785.5029">Soil is dry?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.7017" x="195.5845" y="779.1006">no</text><polygon fill="#F1F1F1" points="153.8555,908.6284,165.8555,920.6284,153.8555,932.6284,141.8555,920.6284,153.8555,908.6284" style="stroke:#181818;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="102.1292,666.1714,205.5818,666.1714,217.5818,678.1714,205.5818,690.1714,102.1292,690.1714,90.1292,678.1714,102.1292,666.1714" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="19.0083" x="157.8555" y="700.3818">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="103.4526" x="102.1292" y="681.9795">One hour elapsed?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.7017" x="217.5818" y="675.5771">no</text><polygon fill="#F1F1F1" points="153.8555,952.6284,165.8555,964.6284,153.8555,976.6284,141.8555,964.6284,153.8555,952.6284" style="stroke:#181818;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="95.1118,469.3984,212.5991,469.3984,224.5991,481.3984,212.5991,493.3984,95.1118,493.3984,83.1118,481.3984,95.1118,469.3984" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="19.0083" x="157.8555" y="503.6089">yes</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="117.4873" x="95.1118" y="485.2065">One second elapsed?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="13.7017" x="224.5991" y="478.8042">no</text><polygon fill="#F1F1F1" points="153.8555,996.6284,165.8555,1008.6284,153.8555,1020.6284,141.8555,1008.6284,153.8555,996.6284" style="stroke:#181818;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="153.8555,141.2656,165.8555,153.2656,153.8555,165.2656,141.8555,153.2656,153.8555,141.2656" style="stroke:#181818;stroke-width:0.5;"/><polygon fill="#F1F1F1" points="141.8555,1040.6284,165.8555,1040.6284,177.8555,1052.6284,165.8555,1064.6284,141.8555,1064.6284,129.8555,1052.6284,141.8555,1040.6284" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="22.5747" x="142.5681" y="1056.4365">true</text><line style="stroke:#181818;stroke-width:1;" x1="153.8555" x2="153.8555" y1="67.2969" y2="87.2969"/><polygon fill="#181818" points="149.8555,77.2969,153.8555,87.2969,157.8555,77.2969,153.8555,81.2969" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="153.8555" x2="153.8555" y1="219.2344" y2="247.5156"/><polygon fill="#181818" points="149.8555,237.5156,153.8555,247.5156,157.8555,237.5156,153.8555,241.5156